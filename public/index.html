<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared To-Do List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Fraunces:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #fdf6ec;
    --card:      #fffcf7;
    --card2:     #fff9f0;
    --border:    #ecdfd0;
    --text:      #3d2b1a;
    --muted:     #a08060;
    --accent:    #e07b39;
    --accent-h:  #c96828;
    --danger:    #d94f4f;
    --sel:       #e07b39;
    --sel-glow:  rgba(224,123,57,.18);
    --shadow:    0 2px 10px rgba(100,60,20,.08);
    --shadow-lg: 0 4px 20px rgba(100,60,20,.12);
    --radius:    14px;
    --radius-sm: 9px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(224,123,57,.06) 0%, transparent 50%),
      radial-gradient(circle at 85% 80%, rgba(180,100,40,.05) 0%, transparent 50%);
    color: var(--text);
    min-height: 100vh;
  }

  .app {
    max-width: 680px;
    margin: 0 auto;
    padding: 36px 16px 60px;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 24px;
    gap: 12px;
  }

  .header-left h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic;
    font-size: 2rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .header-left .subtitle {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .stats {
    font-size: 0.82rem;
    color: var(--muted);
    font-weight: 600;
    white-space: nowrap;
    padding-bottom: 3px;
  }

  /* ── CARD BASE ── */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    padding: 16px 20px;
    margin-bottom: 12px;
  }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .toolbar-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
  }

  .toolbar-label {
    font-size: 0.72rem;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
    margin-right: 2px;
  }

  .toolbar button {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 7px 13px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--card2);
    color: var(--text);
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    transition: background .15s, border-color .15s, opacity .15s, transform .1s;
  }
  .toolbar button:hover:not(:disabled) {
    background: #fff3e8;
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .toolbar button:disabled { opacity: 0.3; cursor: default; transform: none; }
  .toolbar button.danger:hover:not(:disabled) {
    background: #fff0f0;
    border-color: var(--danger);
    color: var(--danger);
  }

  .toolbar-sep {
    width: 1px;
    height: 22px;
    background: var(--border);
    margin: 0 2px;
  }

  .io-group {
    margin-left: auto;
    display: flex;
    gap: 6px;
  }

  .io-group button {
    padding: 6px 11px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--card2);
    color: var(--muted);
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    transition: background .15s, color .15s, border-color .15s;
  }
  .io-group button:hover {
    background: #fff3e8;
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── SWATCHES ── */
  .swatches {
    display: flex;
    align-items: center;
    gap: 5px;
    flex-wrap: wrap;
  }

  .swatch {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2.5px solid transparent;
    cursor: pointer;
    transition: transform .12s, box-shadow .12s;
    flex-shrink: 0;
    outline: none;
  }
  .swatch:hover { transform: scale(1.25); }
  .swatch.selected {
    border-color: var(--text);
    box-shadow: 0 0 0 2px rgba(61,43,26,.2);
    transform: scale(1.1);
  }
  .swatch[data-color=""] {
    background: #e8e0d6;
    background-image:
      linear-gradient(135deg, #c8bfb5 25%, transparent 25%, transparent 75%, #c8bfb5 75%),
      linear-gradient(135deg, #c8bfb5 25%, transparent 25%, transparent 75%, #c8bfb5 75%);
    background-size: 8px 8px;
    background-position: 0 0, 4px 4px;
  }

  /* ── ADD FORM ── */
  .add-form {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .add-form-row1 {
    display: flex;
    gap: 10px;
  }

  .add-form-row2 {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
  }

  .add-form input[type="text"] {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text);
    outline: none;
    transition: border-color .18s, box-shadow .18s;
  }
  .add-form input[type="text"]::placeholder { color: #c0a888; }
  .add-form input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--sel-glow);
  }

  .add-form .assignee-input {
    width: 150px;
    flex: none;
  }

  .add-btn {
    padding: 10px 22px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    font-weight: 800;
    letter-spacing: 0.02em;
    transition: background .15s, transform .1s, box-shadow .15s;
    box-shadow: 0 2px 8px rgba(224,123,57,.35);
    white-space: nowrap;
    margin-left: auto;
  }
  .add-btn:hover {
    background: var(--accent-h);
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(224,123,57,.4);
  }
  .add-btn:active { transform: translateY(0); }

  /* ── TODO LIST ── */
  .todo-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
  }

  .todo-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 18px;
    border-radius: var(--radius);
    background: var(--card);
    border: 1.5px solid var(--border);
    border-left: 4px solid var(--border);
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s, opacity .2s, transform .12s;
    user-select: none;
    box-shadow: var(--shadow);
  }

  .todo-row:hover {
    box-shadow: var(--shadow-lg);
    transform: translateX(2px);
  }

  .todo-row.selected {
    border-color: var(--sel);
    border-left-color: var(--sel);
    box-shadow: 0 0 0 3px var(--sel-glow), var(--shadow-lg);
    transform: translateX(3px);
  }

  .todo-row.done {
    opacity: 0.4;
  }

  .todo-row.urgent {
    background: #fff5f0;
    border-color: #f5b89a;
    border-left-color: #e05020;
  }

  /* color left-border accents */
  .todo-row[data-color="red"]    { background: #fff5f5; border-left-color: #e53935; border-color: #fdd; }
  .todo-row[data-color="orange"] { background: #fff8f2; border-left-color: #fb8c00; border-color: #fde8cc; }
  .todo-row[data-color="yellow"] { background: #fffef0; border-left-color: #e6b800; border-color: #f5e8a0; }
  .todo-row[data-color="green"]  { background: #f4fdf5; border-left-color: #43a047; border-color: #c5e8c7; }
  .todo-row[data-color="teal"]   { background: #f0fbfc; border-left-color: #00acc1; border-color: #b2e8ef; }
  .todo-row[data-color="blue"]   { background: #f3f8ff; border-left-color: #1e88e5; border-color: #c5dcf7; }
  .todo-row[data-color="purple"] { background: #faf4ff; border-left-color: #8e24aa; border-color: #ddb8ee; }
  .todo-row[data-color="pink"]   { background: #fff4f8; border-left-color: #e91e63; border-color: #f7c0d5; }

  /* urgent always overrides */
  .todo-row.urgent[data-color] { background: #fff5f0; border-left-color: #e05020; border-color: #f5b89a; }

  .todo-dot {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    flex-shrink: 0;
    background: #d5c5b0;
    transition: background .15s;
  }

  .todo-row.urgent .todo-dot                { background: #e05020; }
  .todo-row[data-color="red"]    .todo-dot  { background: #e53935; }
  .todo-row[data-color="orange"] .todo-dot  { background: #fb8c00; }
  .todo-row[data-color="yellow"] .todo-dot  { background: #e6b800; }
  .todo-row[data-color="green"]  .todo-dot  { background: #43a047; }
  .todo-row[data-color="teal"]   .todo-dot  { background: #00acc1; }
  .todo-row[data-color="blue"]   .todo-dot  { background: #1e88e5; }
  .todo-row[data-color="purple"] .todo-dot  { background: #8e24aa; }
  .todo-row[data-color="pink"]   .todo-dot  { background: #e91e63; }
  .todo-row.urgent[data-color]   .todo-dot  { background: #e05020; }

  .todo-text {
    flex: 1;
    font-size: 0.93rem;
    font-weight: 600;
    word-break: break-word;
    line-height: 1.4;
  }

  .todo-row.done .todo-text {
    text-decoration: line-through;
    font-weight: 500;
  }

  .todo-assignee {
    font-size: 0.75rem;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
    font-weight: 700;
    background: rgba(160,128,96,.1);
    border-radius: 20px;
    padding: 2px 8px;
  }

  .urgent-badge {
    font-size: 0.68rem;
    background: #e05020;
    color: #fff;
    border-radius: 5px;
    padding: 2px 7px;
    flex-shrink: 0;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .empty-state {
    text-align: center;
    padding: 56px 0;
    color: #c0a888;
    font-size: 0.95rem;
    font-weight: 600;
  }
  .empty-state::before {
    content: '✦';
    display: block;
    font-size: 2rem;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  #file-input { display: none; }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .app { padding: 20px 12px 40px; }
    .header-left h1 { font-size: 1.6rem; }
    .io-group { margin-left: 0; }
    .add-btn { width: 100%; margin-left: 0; }
    .add-form-row2 { gap: 6px; }
    .add-form .assignee-input { width: 100%; flex: 1 1 100%; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-left">
      <h1>To-Do List</h1>
      <div class="subtitle">shared · live</div>
    </div>
    <span class="stats" id="stats"></span>
  </header>

  <!-- TOOLBAR -->
  <div class="card">
    <div class="toolbar">
      <div class="toolbar-row">
        <button id="btn-complete" disabled>✓ Complete</button>
        <button id="btn-urgent" class="urgent-btn" disabled>⚡ Urgent</button>
        <button id="btn-delete" class="danger" disabled>🗑 Delete</button>
        <div class="toolbar-sep"></div>
        <span class="toolbar-label">Color</span>
        <div class="swatches" id="toolbar-swatches"></div>
        <div class="io-group">
          <button id="btn-export">↓ Export</button>
          <button id="btn-import">↑ Import</button>
          <input type="file" id="file-input" accept=".json">
        </div>
      </div>
    </div>
  </div>

  <!-- ADD FORM -->
  <div class="card">
    <div class="add-form">
      <div class="add-form-row1">
        <input type="text" id="new-text" placeholder="What needs to get done?" autocomplete="off">
      </div>
      <div class="add-form-row2">
        <input type="text" id="new-assignee" class="assignee-input" placeholder="Assign to…" autocomplete="off">
        <div class="swatches" id="add-swatches"></div>
        <button class="add-btn" id="btn-add">Add Task</button>
      </div>
    </div>
  </div>

  <!-- TASK LIST -->
  <div class="todo-list" id="todo-list"></div>
</div>

<script>
const COLORS = ['', 'red', 'orange', 'yellow', 'green', 'teal', 'blue', 'purple', 'pink'];
const COLOR_HEX = {
  '': null,
  red: '#e53935', orange: '#fb8c00', yellow: '#e6b800',
  green: '#43a047', teal: '#00acc1', blue: '#1e88e5',
  purple: '#8e24aa', pink: '#e91e63'
};

let todos = [];
let lastJSON = '';
let selectedId = null;
let addColor = '';
let toolbarColor = '';

// --- Swatch builders ---
function buildSwatches(container, getCurrent, onSelect) {
  container.innerHTML = '';
  COLORS.forEach(c => {
    const s = document.createElement('div');
    s.className = 'swatch' + (getCurrent() === c ? ' selected' : '');
    s.dataset.color = c;
    if (COLOR_HEX[c]) s.style.background = COLOR_HEX[c];
    s.title = c || 'none';
    s.addEventListener('click', () => onSelect(c));
    container.appendChild(s);
  });
}

function refreshAddSwatches() {
  buildSwatches(
    document.getElementById('add-swatches'),
    () => addColor,
    c => { addColor = c; refreshAddSwatches(); }
  );
}

function refreshToolbarSwatches() {
  buildSwatches(
    document.getElementById('toolbar-swatches'),
    () => toolbarColor,
    async c => {
      if (!selectedId) return;
      toolbarColor = c;
      refreshToolbarSwatches();
      await api('PATCH', `/api/todos/${selectedId}`, { color: c });
      poll();
    }
  );
}

// --- API helpers ---
async function api(method, url, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (!res.ok) throw new Error(`${method} ${url} → ${res.status}`);
  if (res.status === 204) return null;
  return res.json();
}

// --- Sort ---
function sortTodos(list) {
  return [...list].sort((a, b) => {
    if (a.urgent && !a.done && !(b.urgent && !b.done)) return -1;
    if (b.urgent && !b.done && !(a.urgent && !a.done)) return 1;
    if (a.done && !b.done) return 1;
    if (!a.done && b.done) return -1;
    return new Date(a.createdAt) - new Date(b.createdAt);
  });
}

// --- Render ---
function render(data) {
  todos = data;
  const sorted = sortTodos(todos);

  const list = document.getElementById('todo-list');

  // Check if selected still exists
  if (selectedId && !todos.find(t => t.id === selectedId)) {
    selectedId = null;
  }

  const total = todos.length;
  const done = todos.filter(t => t.done).length;
  document.getElementById('stats').textContent =
    total === 0 ? '' : `${total} task${total !== 1 ? 's' : ''} · ${done} done`;

  list.innerHTML = '';

  if (sorted.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'No tasks yet. Add one above!';
    list.appendChild(empty);
    updateToolbar();
    return;
  }

  sorted.forEach(todo => {
    const row = document.createElement('div');
    row.className = 'todo-row' +
      (todo.done ? ' done' : '') +
      (todo.urgent && !todo.done ? ' urgent' : '') +
      (selectedId === todo.id ? ' selected' : '');
    row.dataset.id = todo.id;
    row.dataset.color = todo.color || '';

    const dot = document.createElement('div');
    dot.className = 'todo-dot';

    const text = document.createElement('div');
    text.className = 'todo-text';
    text.textContent = todo.text;

    row.appendChild(dot);
    row.appendChild(text);

    if (todo.urgent && !todo.done) {
      const badge = document.createElement('span');
      badge.className = 'urgent-badge';
      badge.textContent = 'URGENT';
      row.appendChild(badge);
    }

    if (todo.assignee) {
      const assignee = document.createElement('div');
      assignee.className = 'todo-assignee';
      assignee.textContent = todo.assignee;
      row.appendChild(assignee);
    }

    row.addEventListener('click', () => {
      selectedId = selectedId === todo.id ? null : todo.id;
      if (selectedId) {
        const t = todos.find(x => x.id === selectedId);
        toolbarColor = t ? (t.color || '') : '';
        refreshToolbarSwatches();
      }
      renderSelection();
    });

    list.appendChild(row);
  });

  updateToolbar();
}

function renderSelection() {
  document.querySelectorAll('.todo-row').forEach(row => {
    row.classList.toggle('selected', row.dataset.id === selectedId);
  });
  updateToolbar();
}

function updateToolbar() {
  const sel = selectedId ? todos.find(t => t.id === selectedId) : null;
  const dis = !sel;

  document.getElementById('btn-complete').disabled = dis || sel?.done;
  document.getElementById('btn-urgent').disabled = dis || sel?.done;
  document.getElementById('btn-delete').disabled = dis;
  document.getElementById('btn-urgent').textContent =
    sel && sel.urgent ? '⚡ Un-urgent' : '⚡ Urgent';

  document.querySelectorAll('#toolbar-swatches .swatch').forEach(s => {
    s.style.opacity = dis ? '0.3' : '1';
    s.style.pointerEvents = dis ? 'none' : '';
  });
}

// --- Poll ---
async function poll() {
  try {
    const data = await api('GET', '/api/todos');
    const json = JSON.stringify(data);
    if (json !== lastJSON) {
      lastJSON = json;
      render(data);
    }
  } catch (e) {
    console.error('Poll error:', e);
  }
}

// --- Event handlers ---
document.getElementById('btn-complete').addEventListener('click', async () => {
  if (!selectedId) return;
  await api('PATCH', `/api/todos/${selectedId}`, { done: true });
  selectedId = null;
  poll();
});

document.getElementById('btn-urgent').addEventListener('click', async () => {
  if (!selectedId) return;
  const todo = todos.find(t => t.id === selectedId);
  if (!todo) return;
  await api('PATCH', `/api/todos/${selectedId}`, { urgent: !todo.urgent });
  poll();
});

document.getElementById('btn-delete').addEventListener('click', async () => {
  if (!selectedId) return;
  await api('DELETE', `/api/todos/${selectedId}`);
  selectedId = null;
  poll();
});

document.getElementById('btn-add').addEventListener('click', addTask);
document.getElementById('new-text').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

async function addTask() {
  const textEl = document.getElementById('new-text');
  const assigneeEl = document.getElementById('new-assignee');
  const text = textEl.value.trim();
  if (!text) { textEl.focus(); return; }

  await api('POST', '/api/todos', {
    text,
    assignee: assigneeEl.value.trim(),
    color: addColor,
    urgent: false
  });

  textEl.value = '';
  assigneeEl.value = '';
  addColor = '';
  refreshAddSwatches();
  textEl.focus();
  poll();
}

// --- Export ---
document.getElementById('btn-export').addEventListener('click', () => {
  const date = new Date().toISOString().slice(0, 10);
  const blob = new Blob([JSON.stringify(todos, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `todos-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
});

// --- Import ---
document.getElementById('btn-import').addEventListener('click', () => {
  document.getElementById('file-input').click();
});

document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) { alert('Invalid file: expected a JSON array.'); return; }
      await api('POST', '/api/todos/import', data);
      poll();
    } catch (err) {
      alert('Failed to parse JSON file.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// --- Init ---
refreshAddSwatches();
refreshToolbarSwatches();
poll();
setInterval(poll, 3000);
</script>
</body>
</html>
